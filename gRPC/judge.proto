syntax = "proto3";

package judge;

service JudgeService {

  rpc Request(RequestMessage)
      returns (RequestResponse);

  rpc Submit(SubmitRequest)
      returns (SubmitResponse);
}

message RequestMessage {
  string student_code = 1;
  string question_alias = 2;
}

message RequestResponse {
  string request_id = 1;
  string data = 2;
}

message SubmitRequest {
  string student_code = 1;
  string question_alias = 2;
  string request_id = 3;
  string answer = 4;
}

message SubmitResponse {
  string status = 1;
  string message = 2;
}
